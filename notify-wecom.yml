name: 推送Issue到企业微信

on:
  issues:
    types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: 发送企业微信通知
        env:
          WECOM_KEY: ef336bdf-67db-469a-9e87-c6fca6c64edd
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          curl -X POST "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=${WECOM_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"msgtype\":\"markdown\",\"markdown\":{\"content\":\"## ${ISSUE_TITLE}\\n\\n${ISSUE_BODY}\"}}"
